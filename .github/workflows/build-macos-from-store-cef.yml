# Build workflow that downloads prebuilt deps and optional CEF, handles various CEF archive layouts (including dist/),
# prints debug info for CEF dist contents and cef_sandbox undefined symbols, ensures libcef_dll_wrapper and cef_sandbox
# are available to Substrata CMake, bundles Qt and CEF into the app, and packages the app.
name: Build macOS gui_client using stored deps (Release, optional CEF)

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "If true, create a GitHub Release and upload the zip there"
        required: true
        default: "false"
      tag_name:
        description: "Release tag (required if create_release=true), e.g. v0.1.0"
        required: false
      deps_release_tag:
        description: "Tag in the deps store repo to download (optional). If empty, use latest."
        required: false
        default: ""
      cef_archive_url:
        description: "Optional direct URL to a prebuilt CEF binary distribution (tar.bz2, tar.gz, or zip). If provided, CEF_SUPPORT will be enabled and the archive will be extracted and prebuilt artifacts used or libcef_dll_wrapper/cef_sandbox built if sources present."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15-intel

    env:
      BASE_DIR: ${{ github.workspace }}/work

      # Glare build scripts expect these environment variables.
      GLARE_CORE_LIBS: ${{ github.workspace }}/work
      WINTER_DIR: ${{ github.workspace }}/work/winter
      GLARE_CORE_TRUNK_DIR: ${{ github.workspace }}/work/glare-core
      CYBERSPACE_OUTPUT: ${{ github.workspace }}/work/substrata_output

      # Default is OFF; if user provides cef_archive_url the workflow will enable it at runtime.
      CEF_SUPPORT: "OFF"
      BUILD_CONFIG: "Release"

      STORE_OWNER: "JerryBerry12"
      STORE_REPO: "kingdomvr-store-deps"

    steps:
      - name: Check STORE_REPO_PAT secret at runtime
        run: |
          # Can't reference secrets in step-level 'if' during workflow validation,
          # so check at runtime instead.
          if [ -z "${{ secrets.STORE_REPO_PAT }}" ]; then
            echo "Secret STORE_REPO_PAT is required in this repository (a PAT with repo access to ${STORE_OWNER}/${STORE_REPO})."
            exit 1
          fi

      - name: Show runner + disk info (before)
        run: |
          echo "uname -a: $(uname -a)"
          echo "uname -m: $(uname -m)"
          sysctl -n machdep.cpu.brand_string || true
          ruby --version || true
          cmake --version || true
          df -h

      - name: Install minimal tools (Homebrew)
        run: |
          brew update
          brew install jq

      - name: Download deps archive from store repository
        id: download_asset
        env:
          STORE_REPO_PAT: ${{ secrets.STORE_REPO_PAT }}
        run: |
          set -euxo pipefail

          TAG_INPUT="${{ github.event.inputs.deps_release_tag }}"
          API="https://api.github.com/repos/${STORE_OWNER}/${STORE_REPO}"

          if [ -n "$TAG_INPUT" ]; then
            echo "Using provided deps tag: $TAG_INPUT"
            REL_RESP=$(curl -s -H "Authorization: token ${STORE_REPO_PAT}" "${API}/releases/tags/${TAG_INPUT}")
          else
            echo "Getting latest deps release"
            REL_RESP=$(curl -s -H "Authorization: token ${STORE_REPO_PAT}" "${API}/releases/latest")
          fi

          ASSET_URL=$(echo "$REL_RESP" | jq -r '.assets[0].url // ""')
          ASSET_NAME=$(echo "$REL_RESP" | jq -r '.assets[0].name // ""')

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "No assets found in the selected deps release. Response:"
            echo "$REL_RESP"
            exit 1
          fi

          echo "Found asset: $ASSET_NAME"
          DEST="${{ github.workspace }}/$ASSET_NAME"

          # Download using the asset API url (requires Accept header)
          curl -L -H "Authorization: token ${STORE_REPO_PAT}" -H "Accept: application/octet-stream" \
            -o "$DEST" "$ASSET_URL"

          echo "downloaded_asset=$DEST" >> "$GITHUB_OUTPUT"

      - name: Extract archive into $BASE_DIR
        run: |
          set -euxo pipefail
          ARCHIVE="${{ steps.download_asset.outputs.downloaded_asset }}"
          if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
            echo "Archive not found at $ARCHIVE - attempting fallback search"
            ARCHIVE="$(ls ${GITHUB_WORKSPACE}/*kingdomvr-deps*.tar.gz | head -n1 || true)"
            echo "Fallback archive: $ARCHIVE"
          fi
          if [ -z "$ARCHIVE" ] || [ ! -f "$ARCHIVE" ]; then
            echo "Archive not found."
            ls -la "${GITHUB_WORKSPACE}"
            exit 1
          fi
          mkdir -p "$BASE_DIR"
          tar -xzf "$ARCHIVE" -C "$BASE_DIR"
          echo "Extracted $ARCHIVE -> $BASE_DIR"

      - name: Optionally download & extract prebuilt CEF (enable CEF_SUPPORT)
        if: ${{ inputs.cef_archive_url != '' }}
        run: |
          set -euxo pipefail

          CEF_URL="${{ github.event.inputs.cef_archive_url }}"
          echo "Downloading CEF archive from: $CEF_URL"

          mkdir -p "${{ github.workspace }}/cef_download"
          CEF_ARCHIVE="${{ github.workspace }}/cef_download/cef_archive"
          EXT="${CEF_URL##*.}"
          case "$EXT" in
            bz2|tbz2)
              CEF_ARCHIVE="${CEF_ARCHIVE}.tar.bz2"
              curl -L -o "$CEF_ARCHIVE" "$CEF_URL"
              mkdir -p "$BASE_DIR/cef_binary"
              tar -xjf "$CEF_ARCHIVE" -C "$BASE_DIR/cef_binary"
              ;;
            gz|tgz)
              CEF_ARCHIVE="${CEF_ARCHIVE}.tar.gz"
              curl -L -o "$CEF_ARCHIVE" "$CEF_URL"
              mkdir -p "$BASE_DIR/cef_binary"
              tar -xzf "$CEF_ARCHIVE" -C "$BASE_DIR/cef_binary"
              ;;
            zip)
              CEF_ARCHIVE="${CEF_ARCHIVE}.zip"
              curl -L -o "$CEF_ARCHIVE" "$CEF_URL"
              mkdir -p "$BASE_DIR/cef_binary"
              unzip -q "$CEF_ARCHIVE" -d "$BASE_DIR/cef_binary"
              ;;
            *)
              CEF_ARCHIVE="${CEF_ARCHIVE}.tar.gz"
              curl -L -o "$CEF_ARCHIVE" "$CEF_URL"
              mkdir -p "$BASE_DIR/cef_binary"
              tar -xzf "$CEF_ARCHIVE" -C "$BASE_DIR/cef_binary" || { echo "Extraction failed; try providing a .tar.bz2/.tar.gz/.zip URL"; exit 1; }
              ;;
          esac

          # Expose CEF_ROOT and enable CEF_SUPPORT for subsequent steps
          # If archive contains a single top-level cef_binary_* dir, set CEF_ROOT to that; else root to cef_binary
          CEF_CAND="$(find "$BASE_DIR/cef_binary" -maxdepth 1 -type d -name 'cef_binary_*' -print -quit || true)"
          if [ -n "$CEF_CAND" ]; then
            echo "CEF_ROOT=$CEF_CAND" >> "$GITHUB_ENV"
          else
            echo "CEF_ROOT=$BASE_DIR/cef_binary" >> "$GITHUB_ENV"
          fi
          echo "CEF_SUPPORT=ON" >> "$GITHUB_ENV"
          echo "Extracted CEF contents to: $BASE_DIR/cef_binary"

      - name: CEF debug — list dist/ contents and show cef_sandbox undefined symbols
        if: ${{ inputs.cef_archive_url != '' }}
        run: |
          set -euxo pipefail

          echo "Looking for dist/ directories under $BASE_DIR/cef_binary..."
          DISTS=$(find "$BASE_DIR/cef_binary" -type d -name 'dist' -print 2>/dev/null || true)
          if [ -z "$DISTS" ]; then
            echo "No dist/ directories found (will also list top-level extraction)."
          fi

          # For each dist dir, list contents and nm on cef_sandbox.a if present
          while IFS= read -r d; do
            [ -n "$d" ] || continue
            echo "==== DIST: $d ===="
            ls -la "$d" || true

            if [ -f "$d/cef_sandbox.a" ]; then
              echo "Found cef_sandbox.a at $d/cef_sandbox.a"
              echo "Undefined symbols (U) in cef_sandbox.a:"
              if command -v nm >/dev/null 2>&1; then
                nm -g "$d/cef_sandbox.a" | grep " U " | sort -u || true
              elif command -v llvm-nm >/dev/null 2>&1; then
                llvm-nm -g "$d/cef_sandbox.a" | grep " U " | sort -u || true
              else
                echo "nm/llvm-nm not available"
              fi
            else
              echo "cef_sandbox.a not found in $d"
            fi

            if [ -f "$d/libcef_dll_wrapper.a" ]; then
              echo "Found libcef_dll_wrapper.a at $d/libcef_dll_wrapper.a"
              ls -la "$d/libcef_dll_wrapper.a" || true
            fi
          done < <(printf "%s\n" "$DISTS")

          echo "---- top-level files under $BASE_DIR/cef_binary (maxdepth 4) ----"
          find "$BASE_DIR/cef_binary" -maxdepth 4 -type f -print || true

      - name: Build libcef_dll_wrapper and ensure cef_sandbox exists (if CEF was provided)
        if: ${{ inputs.cef_archive_url != '' }}
        run: |
          set -euxo pipefail

          # Detect the extracted CEF top-level directory (may be /.../cef_binary or /.../cef_binary/cef_binary_*/)
          CAND="$(find "$BASE_DIR/cef_binary" -maxdepth 2 -type d -name 'cef_binary_*' -print -quit || true)"
          if [ -n "$CAND" ]; then
            CEF_EXTRACT="$CAND"
          elif [ -d "$BASE_DIR/cef_binary" ]; then
            CEF_EXTRACT="$BASE_DIR/cef_binary"
          else
            echo "CEF extraction directory not found under $BASE_DIR/cef_binary"
            exit 1
          fi

          echo "CEF_EXTRACT detected as: $CEF_EXTRACT"

          # If archive used a 'dist' folder (common), use that subdir if present.
          if [ -d "$CEF_EXTRACT/dist" ]; then
            echo "Found dist/ folder under CEF_EXTRACT; switching to $CEF_EXTRACT/dist"
            CEF_EXTRACT="$CEF_EXTRACT/dist"
          fi

          # Check for prebuilt artifacts
          LIBWRAP="$(find "$CEF_EXTRACT" -type f -name 'libcef_dll_wrapper.a' -print -quit || true)"
          SANDBOX="$(find "$CEF_EXTRACT" -type f -name 'cef_sandbox.a' -print -quit || true)"

          echo "Checking for prebuilt CEF artifacts..."
          echo "libcef_dll_wrapper.a: ${LIBWRAP:-not found}"
          echo "cef_sandbox.a: ${SANDBOX:-not found}"

          # Handle sandbox (often prebuilt in official distributions)
          if [ -n "$SANDBOX" ]; then
            mkdir -p "$CEF_EXTRACT/Release" "$CEF_EXTRACT/Debug"
            cp -f "$SANDBOX" "$CEF_EXTRACT/Release/cef_sandbox.a" || true
            cp -f "$SANDBOX" "$CEF_EXTRACT/Debug/cef_sandbox.a" || true
            echo "Copied cef_sandbox.a to Release/ and Debug/"
          fi

          # Build wrapper if not found (official CEF distributions don't include prebuilt wrapper)
          if [ -z "$LIBWRAP" ]; then
            echo "No prebuilt wrapper found; building libcef_dll_wrapper from CEF sources."

            BUILD_DIR="$CEF_EXTRACT/libcef_dll_build"
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"

            echo "Building CEF wrapper from: $CEF_EXTRACT"
            echo "Build directory: $BUILD_DIR"
            echo "Checking for CMakeLists.txt in CEF root:"
            ls -la "$CEF_EXTRACT/CMakeLists.txt" || echo "No top-level CMakeLists.txt found"
            ls -la "$CEF_EXTRACT/libcef_dll/CMakeLists.txt" || echo "No libcef_dll/CMakeLists.txt found"

            # Configure with Unix Makefiles generator
            echo "Running cmake to configure CEF build..."
            if ! cmake -G "Unix Makefiles" "$CEF_EXTRACT" 2>&1 | tee /tmp/cef_cmake_config.log; then
              echo "cmake configuration failed"
              echo "Last 100 lines of cmake output:"
              tail -n 100 /tmp/cef_cmake_config.log || true
              exit 1
            fi

            # Try to build only the wrapper target first
            echo "Building libcef_dll_wrapper target..."
            if cmake --build . --target libcef_dll_wrapper -- -j 3 2>&1 | tee /tmp/cef_wrapper_build.log; then
              echo "libcef_dll_wrapper built successfully"
            else
              echo "Building wrapper target failed"
              tail -n 200 /tmp/cef_wrapper_build.log || true
              echo "Trying full build instead..."
              cmake --build . -- -j 3 2>&1 | tee /tmp/cef_full_build.log || true
            fi

            # Try to build sandbox if available
            echo "Attempting to build cef_sandbox target..."
            if cmake --build . --target cef_sandbox -- -j 3 2>/tmp/cef_sandbox_build.log; then
              echo "cef_sandbox built successfully"
            else
              echo "cef_sandbox target build either not present or failed; continuing"
              tail -n 100 /tmp/cef_sandbox_build.log || true
            fi

            # After build attempts, try to discover built artifacts
            echo "Searching for built artifacts..."
            LIBWRAP="$(find "$CEF_EXTRACT" -type f -name 'libcef_dll_wrapper.a' -print -quit || true)"
            SANDBOX="$(find "$CEF_EXTRACT" -type f -name 'cef_sandbox.a' -print -quit || true)"

            if [ -n "$LIBWRAP" ]; then
              echo "Found libcef_dll_wrapper.a at: $LIBWRAP"
              mkdir -p "$CEF_EXTRACT/libcef_dll_build/libcef_dll_wrapper"
              cp -f "$LIBWRAP" "$CEF_EXTRACT/libcef_dll_build/libcef_dll_wrapper/libcef_dll_wrapper.a"
            else
              echo "ERROR: libcef_dll_wrapper.a was not built"
              echo "Build directory contents:"
              find "$BUILD_DIR" -type f -name '*.a' -print || true
              exit 1
            fi

            # Create empty sandbox libraries if not found (newer CEF versions don't include sandbox)
            SANDBOX_CHECK="$(find "$CEF_EXTRACT" -type f -name 'cef_sandbox.a' -print -quit 2>/dev/null || echo '')"
            echo "Sandbox check result: '${SANDBOX_CHECK}'"
            if [ -z "$SANDBOX_CHECK" ]; then
              echo "WARNING: cef_sandbox.a not found, creating stub archives (Substrata uses no_sandbox=true)"
              mkdir -p "$CEF_EXTRACT/Release" "$CEF_EXTRACT/Debug"
              # Create valid empty archive files
              touch "$CEF_EXTRACT/Release/empty.o"
              ar crs "$CEF_EXTRACT/Release/cef_sandbox.a" "$CEF_EXTRACT/Release/empty.o"
              rm -f "$CEF_EXTRACT/Release/empty.o"
              touch "$CEF_EXTRACT/Debug/empty.o"
              ar crs "$CEF_EXTRACT/Debug/cef_sandbox.a" "$CEF_EXTRACT/Debug/empty.o"
              rm -f "$CEF_EXTRACT/Debug/empty.o"
              echo "Created stub sandbox archives"
              ls -la "$CEF_EXTRACT/Release/cef_sandbox.a" "$CEF_EXTRACT/Debug/cef_sandbox.a"
            else
              echo "Sandbox already exists at: $SANDBOX_CHECK"
            fi
          else
            echo "Found prebuilt libcef_dll_wrapper.a at: $LIBWRAP"
            mkdir -p "$CEF_EXTRACT/libcef_dll_build/libcef_dll_wrapper"
            cp -f "$LIBWRAP" "$CEF_EXTRACT/libcef_dll_build/libcef_dll_wrapper/libcef_dll_wrapper.a"
            echo "Copied to expected path: $CEF_EXTRACT/libcef_dll_build/libcef_dll_wrapper/libcef_dll_wrapper.a"
          fi

          # Verify wrapper artifact exists at expected path - FAIL if not found
          EXPECTED_WRAPPER="$CEF_EXTRACT/libcef_dll_build/libcef_dll_wrapper/libcef_dll_wrapper.a"
          if [ ! -f "$EXPECTED_WRAPPER" ]; then
            echo "ERROR: libcef_dll_wrapper.a not found at expected path: $EXPECTED_WRAPPER"
            echo "Searching for libcef_dll_wrapper.a in $CEF_EXTRACT:"
            find "$CEF_EXTRACT" -type f -name 'libcef_dll_wrapper.a' -print || true
            echo "Contents of libcef_dll_build (if it exists):"
            ls -laR "$CEF_EXTRACT/libcef_dll_build" 2>/dev/null || echo "libcef_dll_build directory not found"
            exit 1
          fi
          
          echo "Verified libcef_dll_wrapper.a exists at: $EXPECTED_WRAPPER"
          ls -lh "$EXPECTED_WRAPPER"

          # Export variables for substrata CMake to consume:
          echo "CEF_ROOT=$CEF_EXTRACT" >> "$GITHUB_ENV"
          echo "CEF_BINARY_DISTRIB_DIR=$CEF_EXTRACT" >> "$GITHUB_ENV"
          echo "CEF_SUPPORT=ON" >> "$GITHUB_ENV"

      - name: Checkout this repo (kingdomvr) into work/substrata (reclone)
        uses: actions/checkout@v4
        with:
          path: work/substrata

      - name: Checkout glare-core (JerryBerry12 fork) (reclone)
        uses: actions/checkout@v4
        with:
          repository: JerryBerry12/glare-core
          ref: master
          path: work/glare-core

      - name: Checkout winter (reclone)
        uses: actions/checkout@v4
        with:
          repository: glaretechnologies/winter
          path: work/winter

      - name: Provide Qt (Homebrew qt@5) and symlink into work/Qt/5.15.10
        env:
          BASE_DIR: ${{ github.workspace }}/work
        run: |
          set -euxo pipefail

          # heartbeat so long-running run is visible
          (while true; do
            echo "[heartbeat] qt provision running: $(date -u)"
            df -h /
            sleep 120
          done) &
          HEARTBEAT_PID=$!

          # Install Homebrew Qt 5
          brew update
          brew install qt@5

          QT_PREFIX="$(brew --prefix qt@5)"
          echo "Homebrew qt@5 prefix: $QT_PREFIX"

          TARGET="$BASE_DIR/Qt/5.15.10"

          # Ensure a clean target and parent dir
          rm -rf "$TARGET"
          mkdir -p "$(dirname "$TARGET")"
          mkdir -p "$TARGET"

          # Symlink common Qt install subdirs into the target layout Substrata expects.
          for d in bin include lib plugins qml translations mkspecs; do
            if [ -e "$QT_PREFIX/$d" ]; then
              ln -s "$QT_PREFIX/$d" "$TARGET/$d"
            fi
          done

          if [ ! -x "$TARGET/bin/qmake" ]; then
            echo "qmake not found at $TARGET/bin/qmake; listing $QT_PREFIX/bin:"
            ls -la "$QT_PREFIX/bin" || true
            kill $HEARTBEAT_PID || true
            exit 1
          fi

          # Make sure subsequent steps pick up this Qt. Use safe expansion in case CMAKE_PREFIX_PATH is unset.
          export PATH="$TARGET/bin:$PATH"
          export CMAKE_PREFIX_PATH="$TARGET:${CMAKE_PREFIX_PATH:-}"

          echo "Qt provisioned at $TARGET (symlinked from $QT_PREFIX)"

          kill $HEARTBEAT_PID || true

      - name: Patch libpng to avoid including <fp.h> on macOS
        env:
          BASE_DIR: ${{ github.workspace }}/work
        run: |
          set -euxo pipefail

          # Look for pngpriv.h inside the checked-out glare-core copy
          PNGPRIV="$(find "$BASE_DIR/glare-core" -type f -name pngpriv.h -print -quit || true)"
          if [ -z "$PNGPRIV" ]; then
            echo "pngpriv.h not found under $BASE_DIR/glare-core; skipping patch"
            exit 0
          fi

          echo "Patching $PNGPRIV to guard fp.h include on macOS"

          # Wrap a plain '# include <fp.h>' with a guard so macOS won't attempt to include it.
          # On macOS, include <math.h> instead since fp.h doesn't exist but math functions are needed.
          if grep -q "#\s*include\s*<fp.h>" "$PNGPRIV"; then
            cat > /tmp/patch_fp.py << 'PYSCRIPT'
          import sys, re
          p = sys.argv[1]
          with open(p, 'r', encoding='utf-8') as f:
              s = f.read()
          pattern = re.compile(r'(^[ \t]*#\s*include\s*<fp\.h>\s*$)', re.M)
          if pattern.search(s):
              def repl(m):
                  inc = m.group(1)
                  return '#if defined(HAVE_FP_H) && !defined(__APPLE__)\n' + inc + '\n#elif defined(__APPLE__)\n#  include <math.h>\n#endif'
              s2 = pattern.sub(repl, s, count=1)
              with open(p, 'w', encoding='utf-8') as f:
                  f.write(s2)
              print('patched')
          else:
              print('no-match')
          PYSCRIPT
            python3 /tmp/patch_fp.py "$PNGPRIV"
            echo "Patch result for $PNGPRIV:"
            grep -n -E "include <fp.h>|HAVE_FP_H" "$PNGPRIV" || true
          else
            echo "No unguarded fp.h include found in $PNGPRIV"
          fi

      - name: Patch zlib zutil.h to avoid breaking fdopen on macOS
        env:
          BASE_DIR: ${{ github.workspace }}/work
        run: |
          set -euxo pipefail

          # Find zutil.h in glare-core
          ZUTIL="$(find "$BASE_DIR/glare-core" -type f -name zutil.h -path '*/zlib/*' -print -quit || true)"
          if [ -z "$ZUTIL" ]; then
            echo "zutil.h not found under $BASE_DIR/glare-core/zlib; skipping patch"
            exit 0
          fi

          echo "Patching $ZUTIL to avoid fdopen macro on macOS"

          # Comment out the fdopen macro definition that breaks on macOS
          if grep -q "#\s*define\s*fdopen" "$ZUTIL"; then
            sed -i.bak '/^[[:space:]]*#[[:space:]]*define[[:space:]]*fdopen/s/^/\/\/ /' "$ZUTIL"
            echo "Patched fdopen macro in $ZUTIL"
            grep -n "fdopen" "$ZUTIL" || true
          else
            echo "No fdopen macro found in $ZUTIL"
          fi

      - name: Configure CMake (Release, CEF flags if provided, x86_64) with sandbox linker fix
        env:
          # pick up CEF_SUPPORT and CEF_ROOT if earlier steps set them via GITHUB_ENV
          CEF_SUPPORT: ${{ env.CEF_SUPPORT }}
          CEF_ROOT: ${{ env.CEF_ROOT }}
        run: |
          set -euxo pipefail

          mkdir -p "$BASE_DIR/substrata_build"
          cd "$BASE_DIR/substrata_build"

          # Build a string of CMake flags for CEF.
          CEF_FLAGS=""
          if [ -n "${CEF_ROOT:-}" ] && [ -d "${CEF_ROOT}" ]; then
            CEF_FLAGS="-DCEF_SUPPORT=ON -DCEF_ROOT=${CEF_ROOT}"
          else
            CEF_FLAGS="-DCEF_SUPPORT=${CEF_SUPPORT}"
          fi

          # If CEF is enabled on macOS we need to link the Apple sandbox library so cef_sandbox.a's
          # references (sandbox_apply, sandbox_compile_string, etc.) are resolved.
          EXTRA_LINK_FLAGS=""
          if [ "${CEF_SUPPORT}" = "ON" ] || [ "${CEF_SUPPORT}" = "1" ]; then
            # Add -lsandbox so linker finds sandbox_* symbols.
            EXTRA_LINK_FLAGS="-lsandbox"
          fi

          echo "Running cmake with flags: ${CEF_FLAGS} and linker flags: ${EXTRA_LINK_FLAGS}"
          cmake "$BASE_DIR/substrata" \
            ${CEF_FLAGS} \
            -DCMAKE_BUILD_TYPE="$BUILD_CONFIG" \
            -DCMAKE_EXE_LINKER_FLAGS="${EXTRA_LINK_FLAGS}"

      - name: Build gui_client (make)
        run: |
          cd "$BASE_DIR/substrata_build"
          make gui_client -j 3

      - name: Locate the real built app (prefer substrata_output GUI that contains the binary), copy prebuilt CEF into it (if present), and run macdeployqt
        run: |
          set -euxo pipefail

          # Prefer any gui_client.app under substrata_output that actually contains a binary
          APP=""
          if [ -d "$BASE_DIR/substrata_output" ]; then
            APP="$(find "$BASE_DIR/substrata_output" -type d -name "gui_client.app" -print0 2>/dev/null | xargs -0 -n1 -I{} sh -c '[ -f "{}/Contents/MacOS/gui_client" ] && printf "%s\n" "{}" && exit 0 || true' || true | head -n1 || true)"
          fi

          # Fallback to possible build dir app
          if [ -z "$APP" ] && [ -d "$BASE_DIR/substrata_build" ]; then
            if [ -f "$BASE_DIR/substrata_build/gui_client.app/Contents/MacOS/gui_client" ]; then
              APP="$BASE_DIR/substrata_build/gui_client.app"
            fi
          fi

          # Final fallback: search whole BASE_DIR
          if [ -z "$APP" ]; then
            while IFS= read -r dir; do
              if [ -f "$dir/Contents/MacOS/gui_client" ]; then
                APP="$dir"
                break
              fi
            done < <(find "$BASE_DIR" -type d -name "gui_client.app" -print 2>/dev/null)
          fi

          if [ -z "$APP" ]; then
            echo "No gui_client.app with binary found. Debug listings:"
            echo "Contents of substrata_build:"
            ls -la "$BASE_DIR/substrata_build" || true
            echo "Contents of substrata_output:"
            ls -la "$BASE_DIR/substrata_output" || true
            echo "Attempting to locate any gui_client.app:"
            find "$BASE_DIR" -type d -name "gui_client.app" -maxdepth 5 -print || true
            exit 1
          fi

          echo "Found built app at: $APP"

          # If we downloaded/extracted CEF, try to copy it into the app before bundling
          if [ -n "${CEF_ROOT:-}" ] && [ -d "${CEF_ROOT}" ]; then
            echo "CEF_ROOT is set to: $CEF_ROOT - attempting to copy CEF runtime into $APP"

            # Find a Chromium Embedded Framework.framework inside the extracted CEF
            CEF_FRAMEWORK="$(find "$CEF_ROOT" -type d -name 'Chromium Embedded Framework.framework' -print -quit || true)"
            if [ -n "$CEF_FRAMEWORK" ]; then
              mkdir -p "$APP/Contents/Frameworks"
              echo "Copying framework: $CEF_FRAMEWORK -> $APP/Contents/Frameworks/"
              cp -R "$CEF_FRAMEWORK" "$APP/Contents/Frameworks/" || true
            else
              echo "No Chromium Embedded Framework.framework found under $CEF_ROOT. Listing $CEF_ROOT for debug:"
              ls -la "$CEF_ROOT" || true
            fi

            # Copy helper apps that were built by the build system into Contents/Frameworks
            # These are built to CYBERSPACE_OUTPUT (substrata_output/) for Release builds
            while IFS= read -r helper; do
              [ -n "$helper" ] || continue
              echo "Copying built helper app: $helper -> $APP/Contents/Frameworks/"
              cp -R "$helper" "$APP/Contents/Frameworks/" || true
            done < <(find "$BASE_DIR/substrata_output" -type d -name "*gui_client*Helper*.app" -maxdepth 2 -print || true)
          fi

          QT_PREFIX="$(brew --prefix qt@5)"
          MACDEPLOYQT="$QT_PREFIX/bin/macdeployqt"

          if [ ! -x "$MACDEPLOYQT" ]; then
            echo "macdeployqt not found at $MACDEPLOYQT"
            echo "Qt prefix contents:"
            ls -la "$QT_PREFIX/bin" || true
            exit 1
          fi

          echo "Running macdeployqt on $APP"
          "$MACDEPLOYQT" "$APP" -verbose=2 || {
            echo "macdeployqt failed on $APP"
            exit 1
          }

          echo "macdeployqt finished. Verifying bundling:"
          echo "Linked libraries for the binary:"
          otool -L "$APP/Contents/MacOS/gui_client" || true
          echo "Contents/Frameworks:"
          ls -la "$APP/Contents/Frameworks" || true
          echo "Contents/PlugIns (if present):"
          ls -la "$APP/Contents/PlugIns" || true

      - name: Copy runtime files to output (no CEF flag passed earlier still respected by script)
        working-directory: work/substrata/scripts
        run: |
          ruby copy_files_to_output.rb --no_cef

      - name: Ensure final output app is bundled (run macdeployqt again if copy moved/created the final app; and copy CEF into final app if needed)
        run: |
          set -euxo pipefail

          # Find final app (prefer substrata_output root, then test_builds)
          FINAL_APP="$(find "$BASE_DIR/substrata_output" -type d -name "gui_client.app" -print -quit || true)"

          if [ -z "$FINAL_APP" ]; then
            FINAL_APP="$BASE_DIR/substrata_output/test_builds/gui_client.app"
          fi

          if [ -z "$FINAL_APP" ] || [ ! -d "$FINAL_APP" ]; then
            echo "Final app not found after copy. Listing substrata_output for debug:"
            ls -la "$BASE_DIR/substrata_output" || true
            find "$BASE_DIR" -type d -name "gui_client.app" -print || true
            exit 1
          fi

          echo "Final app located at: $FINAL_APP"

          if [ ! -f "$FINAL_APP/Contents/MacOS/gui_client" ]; then
            echo "Final app is missing the gui_client binary at: $FINAL_APP/Contents/MacOS/gui_client"
            echo "Dumping final app contents for debug:"
            ls -la "$FINAL_APP/Contents" || true
            exit 1
          fi

          # Copy built helper apps from substrata_output to final app if not already there
          if [ -n "${CEF_ROOT:-}" ] && [ -d "${CEF_ROOT}" ]; then
            CEF_FRAMEWORK="$(find "$CEF_ROOT" -type d -name 'Chromium Embedded Framework.framework' -print -quit || true)"
            if [ -n "$CEF_FRAMEWORK" ]; then
              mkdir -p "$FINAL_APP/Contents/Frameworks"
              cp -R "$CEF_FRAMEWORK" "$FINAL_APP/Contents/Frameworks/" || true
            fi
            # Copy helper apps that were built to CYBERSPACE_OUTPUT (substrata_output/)
            while IFS= read -r helper; do
              [ -n "$helper" ] || continue
              cp -R "$helper" "$FINAL_APP/Contents/Frameworks/" || true
            done < <(find "$BASE_DIR/substrata_output" -type d -name "*gui_client*Helper*.app" -maxdepth 2 -print || true)
          fi

          # Ensure macdeployqt has been run on final app (harmless if already done)
          QT_PREFIX="$(brew --prefix qt@5)"
          MACDEPLOYQT="$QT_PREFIX/bin/macdeployqt"

          echo "Running macdeployqt on final app: $FINAL_APP"
          "$MACDEPLOYQT" "$FINAL_APP" -verbose=2 || {
            echo "macdeployqt (final) failed on $FINAL_APP"
            exit 1
          }

          echo "Final macdeployqt run finished. Verification:"
          otool -L "$FINAL_APP/Contents/MacOS/gui_client" || true
          ls -la "$FINAL_APP/Contents/Frameworks" || true
          ls -la "$FINAL_APP/Contents/PlugIns" || true

      - name: Show disk space (after build)
        run: df -h

      - name: Create distributable zip (gui_client.app) from final output app
        id: package
        run: |
          set -euxo pipefail

          # Locate the final app again
          FINAL_APP="$(find "$BASE_DIR/substrata_output" -type d -name "gui_client.app" -print -quit || true)"
          if [ -z "$FINAL_APP" ]; then
            FINAL_APP="$(find "$BASE_DIR" -type d -name "gui_client.app" -print -quit || true)"
          fi

          if [ -z "$FINAL_APP" ] || [ ! -d "$FINAL_APP" ]; then
            echo "Final app not found for packaging. Debug:"
            ls -la "$BASE_DIR/substrata_output" || true
            find "$BASE_DIR" -type d -name "gui_client.app" -print || true
            exit 1
          fi

          echo "Packaging app at: $FINAL_APP"

          xattr -dr com.apple.quarantine "$FINAL_APP" || true

          VERSION="$(ruby "$BASE_DIR/substrata/scripts/config.rb" --version || echo "unknown")"
          ZIP_NAME="substrata-macos-${VERSION}-gui_client-no-cef.zip"
          ZIP_PATH="${{ github.workspace }}/$ZIP_NAME"

          cd "$(dirname "$FINAL_APP")"
          /usr/bin/zip -r "$ZIP_PATH" "$(basename "$FINAL_APP")"

          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (short retention)
        if: ${{ inputs.create_release != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-gui-client
          path: ${{ steps.package.outputs.zip_path }}
          retention-days: 1

      - name: Validate release inputs
        if: ${{ inputs.create_release == 'true' }}
        run: |
          if [ -z "${{ inputs.tag_name }}" ]; then
            echo "tag_name is required when create_release=true"
            exit 1
          fi

      - name: Create GitHub Release (draft) and upload asset
        if: ${{ inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: ${{ inputs.tag_name }}
          draft: true
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_path }}
