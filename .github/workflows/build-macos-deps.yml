# Build macOS dependencies (LibreSSL, libjpeg-turbo, LLVM) and upload deps archive to private store repo
# Based on original workflow at: https://github.com/KingdomVR/kingdomvr/blob/3afd38bdd3c638e4e38765fea60fcc3099db5d6d/.github/workflows/build-macos-release.yml
name: Build macOS deps and upload to store

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to use for the store release (optional). If empty a generated tag will be used."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-deps:
    runs-on: macos-13

    env:
      BASE_DIR: ${{ github.workspace }}/work

      # Glare build scripts expect these environment variables.
      GLARE_CORE_LIBS: ${{ github.workspace }}/work
      WINTER_DIR: ${{ github.workspace }}/work/winter
      GLARE_CORE_TRUNK_DIR: ${{ github.workspace }}/work/glare-core
      CYBERSPACE_OUTPUT: ${{ github.workspace }}/work/substrata_output

      CEF_SUPPORT: "OFF"
      BUILD_CONFIG: "Release"

      STORE_OWNER: "JerryBerry12"
      STORE_REPO: "kingdomvr-store-deps"
      STORE_REPO_PAT: ${{ secrets.STORE_REPO_PAT }}

    steps:
      - name: Fail if STORE_REPO_PAT not set
        if: ${{ env.STORE_REPO_PAT == '' }}
        run: |
          echo "Secret STORE_REPO_PAT is required in this repository (a PAT with repo access to ${STORE_OWNER}/${STORE_REPO})."
          exit 1

      - name: Checkout this repo (kingdomvr) into work/substrata
        uses: actions/checkout@v4
        with:
          path: work/substrata

      - name: Checkout glare-core (JerryBerry12 fork)
        uses: actions/checkout@v4
        with:
          repository: JerryBerry12/glare-core
          ref: master
          path: work/glare-core

      - name: Checkout winter
        uses: actions/checkout@v4
        with:
          repository: glaretechnologies/winter
          path: work/winter

      - name: Show runner + disk info (before)
        run: |
          echo "uname -a: $(uname -a)"
          echo "uname -m: $(uname -m)"
          sysctl -n machdep.cpu.brand_string || true
          ruby --version || true
          cmake --version || true
          df -h

      - name: Install build prerequisites (Homebrew)
        run: |
          brew update
          brew install cmake ruby python3 ninja jq

      - name: Prepare directories
        run: |
          mkdir -p "$BASE_DIR"
          mkdir -p "$CYBERSPACE_OUTPUT"
          mkdir -p "${{ github.workspace }}/logs"

      - name: Build LibreSSL + libjpeg-turbo (Release only)
        working-directory: work/glare-core/scripts
        run: |
          (while true; do
            echo "[heartbeat] deps build running: $(date -u)"
            df -h /
            sleep 120
          done) &
          HEARTBEAT_PID=$!

          ruby build_libressl.rb --config "$BUILD_CONFIG"
          ruby build_jpegturbo.rb --config "$BUILD_CONFIG"

          kill $HEARTBEAT_PID || true

      - name: Build LLVM (Release only, reduced log spam + observable progress)
        working-directory: work/glare-core/scripts
        run: |
          set -euxo pipefail

          LOG_DIR="${{ github.workspace }}/logs"
          mkdir -p "$LOG_DIR"
          LLVM_LOG="$LOG_DIR/llvm_build.log"
          : > "$LLVM_LOG"

          (
            script -q /dev/null ruby build_llvm.rb --config "$BUILD_CONFIG" >"$LLVM_LOG" 2>&1
          ) &
          LLVM_PID=$!

          T=0
          while kill -0 "$LLVM_PID" 2>/dev/null; do
            echo "[heartbeat] llvm still running: $(date -u) (elapsed ${T}s)"
            echo "[llvm log bytes] $(wc -c < "$LLVM_LOG" 2>/dev/null || echo 0)"
            tail -n 1 "$LLVM_LOG" || true
            if [ $((T % 120)) -eq 0 ]; then
              df -h /
            fi
            sleep 30
            T=$((T + 30))
          done

          wait "$LLVM_PID" || {
            echo "LLVM build failed. Last 200 lines of log:"
            tail -n 200 "$LLVM_LOG" || true
            exit 1
          }

          echo "LLVM build finished. Last 50 lines of log:"
          tail -n 50 "$LLVM_LOG" || true

      - name: Get additional libs used by Substrata
        working-directory: work/substrata/scripts
        run: |
          ruby get_libs.rb

      - name: Show disk space (after deps build)
        run: df -h

      - name: Package freshly-created deps (exclude Qt and repo/build dirs)
        id: package
        run: |
          set -euxo pipefail

          OUT_DIR="$BASE_DIR"
          ARCHIVE_NAME="kingdomvr-deps-${{ github.run_id }}.tar.gz"
          ARCHIVE_PATH="${{ github.workspace }}/$ARCHIVE_NAME"

          # Tar up contents of $BASE_DIR but exclude source/build dirs and Qt.
          # Exclusions: substrata, glare-core, substrata_build, substrata_output, Qt
          tar -C "$OUT_DIR" \
            --exclude='./substrata' \
            --exclude='./glare-core' \
            --exclude='./substrata_build' \
            --exclude='./substrata_output' \
            --exclude='./Qt' \
            -czf "$ARCHIVE_PATH" .

          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Create release in private store repo and upload asset
        env:
          STORE_REPO_PAT: ${{ secrets.STORE_REPO_PAT }}
        run: |
          set -euxo pipefail

          ARCHIVE_PATH="${{ steps.package.outputs.archive_path }}"
          ARCHIVE_NAME="${{ steps.package.outputs.archive_name }}"

          TAG_INPUT="${{ github.event.inputs.tag_name }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="deps-${GITHUB_RUN_ID}"
          fi

          API="https://api.github.com/repos/${STORE_OWNER}/${STORE_REPO}/releases"

          echo "Creating draft release ${TAG} in ${STORE_OWNER}/${STORE_REPO}"
          CREATE_RESP=$(curl -s -X POST -H "Authorization: token ${STORE_REPO_PAT}" -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"draft\":true}" \
            "$API")

          UPLOAD_URL=$(echo "$CREATE_RESP" | jq -r .upload_url)
          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "Failed to create release. Response:"
            echo "$CREATE_RESP"
            exit 1
          fi

          UPLOAD_URL="${UPLOAD_URL%\{*}"

          echo "Uploading asset ${ARCHIVE_NAME}"
          curl -s --data-binary @"${ARCHIVE_PATH}" -H "Authorization: token ${STORE_REPO_PAT}" -H "Content-Type: application/gzip" \
            "${UPLOAD_URL}?name=${ARCHIVE_NAME}" | jq -r .

          echo "Uploaded ${ARCHIVE_NAME} to ${STORE_OWNER}/${STORE_REPO} (draft release ${TAG})."
